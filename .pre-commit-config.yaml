repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.2
    hooks:
      - id: ruff
        name: ruff-lint
        language_version: python3
        stages: [pre-commit]
        files: "^pythonSrc/"

      - id: ruff
        name: ruff-imports
        language_version: python3
        args: ["check", "--select", "I", "--fix"]
        stages: [pre-commit]
        files: "^pythonSrc/"

      - id: ruff-format
        name: ruff-autoformat
        language_version: python3
        stages: [pre-commit]
        files: "^pythonSrc/"

  - repo: local
    hooks:
      - id: pytest-check
        types: [python]
        name: pytest-check
        entry: pytest
        stages: [pre-push]
        language: system
        pass_filenames: false
        always_run: true

      - id: mypy-check
        types: [python]
        name: mypy-check
        entry: mypy pythonSrc
        stages: [pre-push]
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
